    <line x1="7" y1="16" x2="7" y2="22"/>
    <line x1="-12" y1="22" x2="12" y2="22"/>
  </g>

  <!-- chuteira -->
  <g transform="translate(168,32)" opacity="0.10" fill="none" stroke="#7060c0" stroke-width="1">
